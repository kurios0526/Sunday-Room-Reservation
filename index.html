<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주일 룸 예약 현황 · 신촌교회</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--green:#1a7a5e;--green-dark:#0f5240;--green-light:#e8f5f0;--gray1:#f8f9fa;--gray2:#f1f3f5;--gray3:#e9ecef;--gray5:#adb5bd;--gray7:#495057;--ink:#1f2a26;
--c1:#fde2e4;--c2:#dbeafe;--c3:#dcfce7;--c4:#fef3c7;--c5:#ede9fe;--c6:#ffedd5;--c7:#cffafe;--c8:#fce7f3;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#eef3f1;color:var(--ink);padding:0 0 60px}
header{background:var(--green-dark);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.15)}
header img{width:38px;height:38px;border-radius:8px;background:#fff;padding:3px}
header .ht{font-family:'Gowun Batang',serif;font-size:18px;font-weight:700}
header .hs{font-size:11px;opacity:.7;margin-top:2px}
header .hlink{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;transition:.15s}
header .hlink:hover{background:rgba(255,255,255,.28)}
.toolbar{padding:10px 18px;display:flex;flex-direction:column;gap:8px;background:#fff;border-bottom:1px solid var(--gray3)}
.tb-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-btn{border:none;border-radius:8px;padding:8px 13px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.toolbar label{font-size:13px;font-weight:600;color:var(--gray7)}
.toolbar input[type=date]{padding:9px 12px;border:1px solid var(--gray3);border-radius:8px;font-family:inherit;font-size:14px;background:var(--gray1)}
.sun-title{font-family:'Gowun Batang',serif;font-size:17px;font-weight:700;color:var(--green-dark)}
.colorbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 18px;background:#fff;border-bottom:1px solid var(--gray3);align-items:center}
.colorbar .cb-label{font-size:12px;color:var(--gray7);margin-right:4px}
.cb-swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent}
.cb-swatch.sel{border-color:var(--green-dark)}
.cb-legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cb-item{display:flex;align-items:center;gap:3px;cursor:pointer}
.cb-name{font-size:11px;color:var(--gray7);white-space:nowrap}
.hint{padding:10px 18px;font-size:12px;color:var(--gray7);background:var(--green-light)}
.hint b{color:var(--green-dark)}
.grid-wrap{overflow:auto;margin:14px 10px;border:1px solid var(--gray3);border-radius:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05);max-height:calc(100vh - 230px)}
table{border-collapse:collapse;font-size:12px;min-width:max-content}
th,td{border:1px solid var(--gray3);text-align:center;white-space:nowrap}
thead th{background:var(--green);color:#fff;padding:8px 6px;position:sticky;top:0;z-index:10;font-weight:500;font-size:12px}
thead th.corner{left:0;z-index:30;background:var(--green-dark);min-width:84px}
tbody th{background:var(--green-light);color:var(--green-dark);font-weight:700;padding:8px 12px;position:sticky;left:0;z-index:5;text-align:left;font-size:13px;min-width:90px}
td.slot{min-width:72px;height:46px;cursor:pointer;transition:background .1s;padding:2px 4px;font-size:12px;line-height:1.3;color:#222;vertical-align:middle;position:relative}
td.slot:hover{background:var(--gray2)}
td.slot.hourline{border-left:2px solid var(--gray5)}
td.slot.picking{background:#bfe3d6 !important;box-shadow:inset 0 0 0 2px var(--green)}
td.slot.filled{font-weight:600;cursor:pointer;text-align:center;vertical-align:middle}
td.slot.filled .lbl{display:block;text-align:center;white-space:normal;word-break:keep-all;padding:0 4px;font-size:12px}
td.slot.filled .tm{display:block;font-size:10px;font-weight:700;color:#1a5f48;opacity:.8;margin-bottom:1px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;transition:.3s;z-index:100;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.loading{position:fixed;inset:0;background:rgba(238,243,241,.9);display:flex;align-items:center;justify-content:center;z-index:200;font-size:15px;color:var(--green-dark)}
.loading.hide{display:none}
/* 입력 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:150;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.modal h3{font-size:17px;color:var(--green-dark);margin-bottom:4px}
.modal .msub{font-size:13px;color:var(--gray7);margin-bottom:16px}
.modal label{display:block;font-size:12px;font-weight:600;color:var(--gray7);margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:10px 12px;border:1px solid var(--gray3);border-radius:8px;font-family:inherit;font-size:14px;background:var(--gray1)}
.modal .row{display:flex;gap:10px}
.modal .row>div{flex:1}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.mbtn{flex:1;padding:12px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.mbtn.primary{background:var(--green);color:#fff}
.mbtn.primary:hover{background:var(--green-dark)}
.mbtn.ghost{background:#fff;color:var(--gray7);border:1.5px solid var(--gray3)}
.mbtn.danger{background:#c0392b;color:#fff}
.rowprint{margin-left:6px;border:none;background:transparent;cursor:pointer;font-size:13px;opacity:.55;padding:0}
.rowprint:hover{opacity:1}

/* 인쇄 영역 (평소엔 숨김) */
#print-area{display:none}
.print-sheet{page-break-after:always;padding:34px 44px;font-family:'Noto Sans KR',sans-serif;color:#1a1a2e}
.print-sheet:last-child{page-break-after:auto}
.ps-head{display:flex;align-items:flex-end;gap:18px;margin-bottom:22px;padding-bottom:14px;border-bottom:4px solid #5b4b9a}
.ps-room{font-family:'Gowun Batang',serif;font-size:60px;font-weight:700;line-height:1;color:#3a2f6b}
.ps-date{font-size:30px;font-weight:700;color:#5b4b9a;padding-bottom:6px}
.ps-sub{margin-left:auto;font-size:15px;color:#999;padding-bottom:10px;letter-spacing:1px}
.ps-band{display:flex;align-items:stretch;margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.12)}
.ps-band .t{display:flex;align-items:center;justify-content:center;min-width:300px;padding:18px 24px;font-size:34px;font-weight:800;color:#fff;letter-spacing:1px;white-space:nowrap}
.ps-band .c{flex:1;display:flex;align-items:center;padding:14px 30px;font-size:38px;font-weight:700;background:#eef0f6;color:#222}
.ps-band .c .nm{font-size:26px;font-weight:600;color:#666;margin-left:16px}
.ps-empty{font-size:30px;color:#aaa;text-align:center;padding:60px 0}
.ps-foot{margin-top:26px;text-align:center;font-size:14px;color:#bbb}

@media print {
  body > *:not(#print-area){display:none !important;}
  #print-area{display:block !important;}
  @page{margin:10mm;size:landscape;}
}
/* 날짜 표시 인쇄 표지 */
.print-cover{page-break-after:always;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px}
</style>
</head>

// 모임 종류별 색 (부분일치)
// 찬양대=파랑(c2) / 청년부=핑크(c1) / 음악마을=초록(c3) / 성경채점=노랑(c4) / 새신자=보라(c5)
function colorFor(purpose){
  const p=purpose||'';
  if(p.includes('찬양')||p.includes('예루살렘')||p.includes('베다니')||p.includes('시온')||p.includes('갈보리')||p.includes('장로')) return 'c2'; // 찬양대=파랑
  if(p.includes('청년')) return 'c1';        // 청년부 관련=핑크
  if(p.includes('음악마을')) return 'c3';    // 음악마을=초록
  if(p.includes('성경채점')) return 'c4';    // 성경채점=노랑
  if(p.includes('새신자')) return 'c5';      // 새신자 관련=보라
  if(p.includes('여전도회')||p.includes('권사')) return 'c6'; // 여전도회=주황
  return 'c7';                               // 그 외=하늘(기본)
}

function buildGrid(){
  // 헤더만 1회 생성. 본문(tbody)은 render()에서 매번 다시 그림.
  const tbl=document.getElementById('grid');
  let h='<thead><tr><th class="corner">방 \\ 시간</th>';
  TIMES.forEach(t=>{h+='<th class="'+(t.endsWith(":00")?"hourline":"")+'">'+t+'</th>';});
  h+='</tr></thead><tbody id="grid-body"></tbody>';
  tbl.innerHTML=h;
}

// 본문을 예약에 맞춰 다시 그림 (예약 구간은 colspan으로 합쳐 가운데 정렬)
function render(){
  const body=document.getElementById('grid-body');
  let html='';
  ROOMS.forEach(room=>{
    html+='<tr><th>'+room+'<button class="rowprint" onclick="event.stopPropagation();printRoom(\''+room.replace(/'/g,"\\'")+'\')" title="이 방만 인쇄">🖨️</button></th>';
    let i=0;
    while(i<SLOTS.length){
      const bk=findBooking(room,i);
      if(bk){
        // 예약 구간: 시작~끝까지 colspan 한 칸으로 합침
        const si=idxOf(bk.start);
        const ei=idxOf(bk.end); const endIdx=(ei===-1)?SLOTS.length:ei;
        const span=endIdx-si;
        const hour=SLOTS[i].endsWith(":00")?" hourline":"";
        const tlabel=(bk.realStart&&bk.realEnd)?('<span class="tm">'+bk.realStart+'~'+bk.realEnd+'</span>'):'';
        const lbl='<span class="lbl">'+tlabel+(bk.purpose||'')+(bk.name?'<br>'+bk.name:'')+'</span>';
        html+='<td class="slot filled'+hour+'" colspan="'+span+'" style="background:var(--'+(bk.color||'c1')+')" '
             +'data-bkid="'+bk.id+'" onclick="cellClick(this)">'+lbl+'</td>';
        i=endIdx;
      } else {
        const slot=SLOTS[i];
        const hour=slot.endsWith(":00")?" hourline":"";
        const picksel=(pick && pick.room===room && pick.startIdx===i)?" picking":"";
        html+='<td class="slot'+hour+picksel+'" data-room="'+room+'" data-slot="'+slot+'" onclick="cellClick(this)"></td>';
        i++;
      }
    }
    html+='</tr>';
  });
  body.innerHTML=html;
}
// 호환용 별칭 (기존 호출부에서 paintAll 사용)
function paintAll(){ render(); }

function findBooking(room,slotIdx){
  return bookings.find(bk=>{
    if(bk.room!==room)return false;
    const si=idxOf(bk.start), ei=idxOf(bk.end);
    const endIdx=(ei===-1)?SLOTS.length:ei;
    return slotIdx>=si && slotIdx<endIdx;
  });
}

window.cellClick=function(td){
  // 예약된(합쳐진) 칸이면 → 수정
  if(td.dataset.bkid){
    const bk=bookings.find(b=>b.id===td.dataset.bkid);
    if(bk){ pick=null; openEdit(bk); return; }
  }
  const room=td.dataset.room, slot=td.dataset.slot, sIdx=idxOf(slot);
  if(sIdx===-1) return;
  // 구간 선택 시작
  if(!pick || pick.room!==room){
    pick={room, startIdx:sIdx}; render(); return;
  }
  // 같은 방에서 끝 칸 선택
  let a=pick.startIdx, b=sIdx;
  if(b<a){ [a,b]=[b,a]; }
  const startTime=SLOTS[a];
  // 끝 칸을 누르면 '그 칸까지 포함' → 끝 시각은 끝 칸의 다음 경계
  const endTime = (b+1<SLOTS.length)? SLOTS[b+1] : TIMES[TIMES.length-1];
  // 겹침 체크
  for(let i=a;i<=b;i++){ if(findBooking(room,i)){ toast('이미 예약된 시간이 포함되어 있어요'); pick=null; paintAll(); return; } }
  pick=null;
  openNew(room,startTime,endTime);
};

function fillTimeSelects(startSel,endSel,startVal,endVal){
  startSel.innerHTML=SLOTS.map(t=>'<option value="'+t+'">'+t+'</option>').join('');
  endSel.innerHTML=TIMES.slice(1).map(t=>'<option value="'+t+'">'+t+'</option>').join('');
  startSel.value=startVal; endSel.value=endVal;
}
function openNew(room,startTime,endTime){
  editing={room, isNew:true};
  document.getElementById('m-title').textContent='예약 입력';
  document.getElementById('m-sub').textContent=room+' · '+startTime+' ~ '+endTime;
  document.getElementById('m-name').value='';
  document.getElementById('m-purpose').value='';
  fillTimeSelects(document.getElementById('m-start'),document.getElementById('m-end'),startTime,endTime);
  document.getElementById('m-delbtn').style.display='none';
  document.getElementById('modal-bg').classList.add('show');
}
function openEdit(bk){
  editing={room:bk.room, isNew:false, id:bk.id, oldStart:bk.start};
  document.getElementById('m-title').textContent='예약 수정';
  document.getElementById('m-sub').textContent=bk.room;
  document.getElementById('m-name').value=bk.name||'';
  document.getElementById('m-purpose').value=bk.purpose||'';
  fillTimeSelects(document.getElementById('m-start'),document.getElementById('m-end'),bk.start,bk.end);
  curColor=bk.color||'c1';
  document.querySelectorAll('.cb-swatch').forEach(s=>s.classList.toggle('sel',s.dataset.c===curColor));
  document.getElementById('m-delbtn').style.display='block';
  document.getElementById('modal-bg').classList.add('show');
}
window.closeModal=function(){document.getElementById('modal-bg').classList.remove('show');editing=null;};

window.saveBooking=async function(){
  if(!editing)return;
  const name=document.getElementById('m-name').value.trim();
  const purpose=document.getElementById('m-purpose').value.trim();
  const start=document.getElementById('m-start').value;
  const end=document.getElementById('m-end').value;
  if(idxOf(start)>=(idxOf(end)===-1?SLOTS.length:idxOf(end))){ toast('끝 시간이 시작보다 뒤여야 해요'); return; }
  if(!name && !purpose){ toast('이름이나 목적 중 하나는 입력해 주세요'); return; }
  // 겹침 체크(자기 자신 제외)
  const si=idxOf(start), ei=(idxOf(end)===-1?SLOTS.length:idxOf(end));
  for(let i=si;i<ei;i++){
    const f=findBooking(editing.room,i);
    if(f && f.id!==editing.id){ toast('다른 예약과 시간이 겹쳐요'); return; }
  }
  try{
    // 수정인데 시작시간이 바뀌면 기존 문서 삭제 후 새로 저장(문서ID가 시작시간 기반)
    if(!editing.isNew && editing.oldStart!==start){
      await deleteDoc(doc(db,'sunday_bookings',editing.id));
    }
    const id=docId(curDate,editing.room,start);
    await setDoc(doc(db,'sunday_bookings',id),{
      date:curDate, room:editing.room, start, end, name, purpose, color:curColor, updatedAt:new Date().toISOString()
    });
    closeModal();
  }catch(e){ toast('저장 실패: '+e.message); }
};
window.deleteCurrent=async function(){
  if(!editing||!editing.id)return;
  if(!confirm('이 예약을 삭제할까요?'))return;
  try{ await deleteDoc(doc(db,'sunday_bookings',editing.id)); closeModal(); }
  catch(e){ toast('삭제 실패: '+e.message); }
};

function loadDate(dateStr){
  curDate=dateStr; pick=null;
  const d=new Date(dateStr+'T00:00:00');
  document.getElementById('sun-title').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일 주일';
  bookings=[]; paintAll();
  if(unsub)unsub();
  const qy=query(collection(db,'sunday_bookings'), where('date','==',dateStr));
  unsub=onSnapshot(qy,(snap)=>{
    bookings=[]; snap.forEach(s=>{const v=s.data();bookings.push({id:s.id,room:v.room,start:v.start,end:v.end,name:v.name,purpose:v.purpose,color:v.color,realStart:v.realStart,realEnd:v.realEnd,isFixed:v.isFixed});});
    paintAll();
    document.getElementById('loading').classList.add('hide');
  },(err)=>{document.getElementById('loading').classList.add('hide');toast('불러오기 오류: '+err.message);});
}

// ===== 인쇄 (방별 한 장씩) =====
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dateTitle(){ const d=new Date(curDate+'T00:00:00'); return (d.getMonth()+1)+'월 '+d.getDate()+'일 주일'; }
function roomSheet(room){
  const list=bookings.filter(b=>b.room===room).sort((a,b)=>idxOf(a.start)-idxOf(b.start));
  // 시간 순서대로 보라→파랑→하늘색 그라데이션 (사진 느낌)
  const palette=['#6a4fa3','#5b5bbf','#4a6fd0','#3f7fcf','#3a90c9','#3aa0c0','#37b0bb','#46b8c9','#5ec3d6'];
  let items='';
  if(list.length){
    list.forEach((bk,i)=>{
      const col=palette[Math.min(i,palette.length-1)];
      const tt=(bk.realStart&&bk.realEnd)?(bk.realStart+' ~ '+bk.realEnd):(bk.start+' ~ '+bk.end);
      items+='<div class="ps-band"><div class="t" style="background:'+col+'">'+tt+'</div>'+
             '<div class="c">'+esc(bk.purpose||'(목적 미입력)')+(bk.name?'<span class="nm">'+esc(bk.name)+'</span>':'')+'</div></div>';
    });
  } else {
    items='<div class="ps-empty">예약 없음</div>';
  }
  return '<div class="print-sheet">'+
         '<div class="ps-head"><div class="ps-room">'+esc(room)+'</div><div class="ps-date">'+dateTitle()+'</div>'+
         '<div class="ps-sub">신촌교회 룸 예약 현황</div></div>'+
         items+
         '<div class="ps-foot">신촌성결교회 · 사무처</div></div>';
}
window.printRoom=function(room){
  document.getElementById('print-area').innerHTML=roomSheet(room);
  window.print();
};
window.printAll=function(){
  let html='';
  ROOMS.forEach(r=>{ html+=roomSheet(r); });
  document.getElementById('print-area').innerHTML=html;
  window.print();
};

window.loadTemplate=async function(week){
  let tpl;
  let weekLabel;
  if(week===1){ tpl=TPL_WEEK1; weekLabel='1주(짝수달)'; }
  else if(week==='1h'){ tpl=TPL_WEEK1H; weekLabel='1주(홀수달)'; }
  else if(week===2){ tpl=TPL_WEEK2; weekLabel='2주'; }
  else if(week===3){ tpl=TPL_WEEK3; weekLabel='3주'; }
  else if(week===4){ tpl=TPL_WEEK4; weekLabel='4주'; }
  else if(week===5){ tpl=TPL_WEEK5; weekLabel='5주'; }
  else return;
  if(!confirm(weekLabel+' 고정 일정을 현재 날짜('+dateTitle()+')에 불러옵니다.\n이미 있는 같은 칸은 덮어쓰며, 다른 예약은 그대로 둡니다. 계속할까요?')) return;
  let ok=0, skip=0;
  for(const [room,rs,re,purpose] of tpl){
    const startSlot=snapStartSlot(rs);
    const endBoundary=snapEndBoundary(re);
    const si=idxOf(startSlot), ei=idxOf(endBoundary);
    const endIdx=(ei===-1)?SLOTS.length:ei;
    // 겹침 체크: 같은 방에서 이 구간에 '고정아닌' 다른 예약이 있으면 건너뜀
    let blocked=false;
    for(let k=si;k<endIdx;k++){ const f=findBooking(room,k); if(f && !f.isFixed){ blocked=true; break; } }
    if(blocked){ skip++; continue; }
    try{
      const id=docId(curDate,room,startSlot);
      await setDoc(doc(db,'sunday_bookings',id),{
        date:curDate, room, start:startSlot, end:endBoundary,
        realStart:rs, realEnd:re, name:'', purpose, color:colorFor(purpose),
        isFixed:true, week, updatedAt:new Date().toISOString()
      });
      ok++;
    }catch(e){ /* 무시하고 계속 */ }
  }
  toast(weekLabel+' 고정 일정 '+ok+'건 불러옴'+(skip?(' · '+skip+'건은 기존 예약과 겹쳐 건너뜀'):''));
};

buildGrid();
const sun=nextSunday();
document.getElementById('sunday-date').value=fd(sun);
loadDate(fd(sun));
</script>
</body>
</html>
